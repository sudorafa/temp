<mat-card>
  <mat-card-header>
    <mat-icon mat-card-avatar class="icon-avatar">
      {{ icon() }}
    </mat-icon>
    <mat-card-title>{{ title() }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div #chartID class="chart"></div>
  </mat-card-content>
  <mat-card-footer>
    <mat-progress-bar mode="determinate" value="100"></mat-progress-bar>
  </mat-card-footer>
</mat-card>
